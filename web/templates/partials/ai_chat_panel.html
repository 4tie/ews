<div class="chat-panel-backdrop" id="ai-chat-backdrop"></div>
<aside id="ai-chat-panel" class="chat-panel" aria-hidden="true">
  <div class="chat-header">
    <h3>AI Assistant</h3>
    <button id="close-chat" type="button" aria-label="Close AI chat">&times;</button>
  </div>
  <div id="chat-messages" class="chat-messages" aria-live="polite">
    <!-- Messages appear here -->
  </div>
  <div class="chat-input-container">
    <textarea id="chat-input" placeholder="Ask about your strategy..."></textarea>
    <button id="btn-send-chat" type="button">Send</button>
  </div>
</aside>
