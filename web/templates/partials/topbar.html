<header class="topbar" id="topbar">
  <div class="topbar__left">
    <h1 class="topbar__title">{{ title }}</h1>
  </div>
  <div class="topbar__right">
    <button class="btn btn--ghost btn--sm topbar__chat-toggle" id="btn-open-ai-chat" type="button" aria-pressed="false">
      AI Assistant
    </button>
    <div class="topbar__status" id="status-indicator">
      <span class="status-dot status-dot--idle" id="status-dot"></span>
      <span class="status-label" id="status-label">Idle</span>
    </div>
  </div>
</header>
